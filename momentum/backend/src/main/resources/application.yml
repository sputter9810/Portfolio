spring:
  application:
    name: momentum-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/momentum
    username: momentum_user
    password: momentum_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: 8f7a6d5c4b3a2910f8e7d6c5b4a3928172635445362718190a1b2c3d4e5f6071
    expiration-ms: 86400000