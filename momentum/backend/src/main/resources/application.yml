spring:
  application:
    name: momentum-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/momentum
    username: momentum_user
    password: momentum_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080